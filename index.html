<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>色彩大對決</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #game-container {
            width: 100%;
            max-width: 500px; 
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            margin: 10px 0;
            text-align: center;
        }

        .room-info {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
            background-color: #222;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .control-panel {
            display: none; 
            width: 100%;
            background-color: #1e1e1e;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            text-align: center;
            border: 1px solid #a2b;
        }

        button {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 14px;
            margin: 4px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }

        .target-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        #target-color-box {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            border: 2px solid #fff;
            background-color: #ccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background-color 0.1s ease; /* 變色平滑一點 */
        }

        #grid-container {
            display: grid;
            gap: 8px; 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background-color: #1e1e1e;
            padding: 12px;
            border-radius: 16px;
            box-sizing: border-box;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .cell {
            border-radius: 8px; 
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .cell:active {
            transform: scale(0.92);
            filter: brightness(0.8);
        }

        .lobby-panel {
            width: 100%;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-sizing: border-box;
        }
        .lobby-input {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #121212;
            color: white;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>🎨 色彩大對決</h1>
        <div id="room-display" class="room-info" style="display: none;"></div>

        <div id="lobby-section" class="lobby-panel">
            <p>請輸入要加入的房間號碼：</p>
            <input type="number" id="room-input" class="lobby-input" placeholder="例如: 888" min="1"><br>
            <button onclick="joinAsPlayer()" style="background-color: #2b8; padding: 12px 24px;">👥 進入房間（成員）</button>
            <p style="color: #666; font-size: 12px; margin-top: 15px;">如果你是房主，請直接點擊下方：</p>
            <button onclick="createAsHost()" style="background-color: #a2b; font-size: 12px;">👑 建立新房間（房主）</button>
        </div>

        <div id="battle-section" style="display: none; width: 100%; flex-direction: column; align-items: center;">
            <div id="host-panel" class="control-panel">
                <span style="color: #a2b; font-weight: bold; display: block; margin-bottom: 5px;">👑 房主控制台</span>
                <button onclick="changeGridSize(5)">5 x 5</button>
                <button onclick="changeGridSize(7)">7 x 7</button>
                <button onclick="changeGridSize(9)">9 x 9</button>
            </div>

            <div class="target-section">
                <span>目標顏色：</span>
                <div id="target-color-box"></div>
            </div>

            <div id="grid-container"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyANNvPxSkflpr2RMme_fb5vhXRo2YFb4u8",
            authDomain: "color-battle-game-3c9eb.firebaseapp.com",
            projectId: "color-battle-game-3c9eb",
            storageBucket: "color-battle-game-3c9eb.firebasestorage.app",
            messagingSenderId: "669256493534",
            appId: "1:669256493534:web:2705da83d21fc03f36154f",
            measurementId: "G-Q9W172JF6H"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let roomRef = null;
        let isClicking = false; // 防連點鎖鎖
        
        const colorPalette = [
            '#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', 
            '#33FFF0', '#FFA500', '#8A2BE2', '#00FF7F', '#FF1493'
        ];

        window.gameState = {
            role: 'player', 
            roomId: '',
            size: 5,            
            colorMap: [],       
            targetColor: '#ccc' 
        };

        window.createAsHost = function() {
            const randomRoom = Math.floor(Math.random() * 900) + 100; 
            window.location.href = window.location.pathname + `?room=${randomRoom}&role=host`;
        };

        window.joinAsPlayer = function() {
            const num = document.getElementById('room-input').value;
            if(!num) { alert('請輸入房間號碼！'); return; }
            window.location.href = window.location.pathname + `?room=${num}`;
        };

        function initRoomCheck() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            const roleParam = urlParams.get('role');

            if (roomParam) {
                window.gameState.roomId = roomParam;
                
                if (roleParam === 'host') {
                    window.gameState.role = 'host';
                    document.getElementById('host-panel').style.display = 'block'; 
                }

                document.getElementById('lobby-section').style.display = 'none';
                document.getElementById('battle-section').style.display = 'flex';
                
                const roomDisplay = document.getElementById('room-display');
                roomDisplay.innerText = `房間號碼：${roomParam} (${window.gameState.role === 'host' ? '👑 房主' : '👥 成員'})`;
                roomDisplay.style.display = 'block';

                roomRef = db.collection("rooms").doc(`room_${roomParam}`);
                startListening();
            }
        }

        function generateColors(size) {
            let newColorMap = [];
            for (let i = 0; i < size * size; i++) {
                newColorMap.push(colorPalette[Math.floor(Math.random() * colorPalette.length)]);
            }
            return newColorMap;
        }

        window.changeGridSize = function(size) {
            if (window.gameState.role !== 'host') return;
            const newColorMap = generateColors(size);
            roomRef.set({
                size: size,
                colorMap: newColorMap,
                targetColor: '#ccc'
            });
        };

        function renderGame() {
            const gridContainer = document.getElementById('grid-container');
            if(!gridContainer) return;
            gridContainer.innerHTML = ''; 

            const size = window.gameState.size;
            gridContainer.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridContainer.style.gridTemplateRows = `repeat(${size}, 1fr)`;

            if (!window.gameState.colorMap || window.gameState.colorMap.length === 0) return;

            window.gameState.colorMap.forEach((color, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.backgroundColor = color;

                cell.addEventListener('click', async () => {
                    if (window.gameState.role === 'host') {
                        // 🔐 防抖限制：如果前一次點擊還在傳輸，直接擋掉，避免抓到舊資料
                        if (isClicking) return;
                        isClicking = true;

                        // ✨ 關鍵改動：先強制更新雲端，等雲端完成，確保下一動抓到的永遠是最新的
                        try {
                            await roomRef.update({ targetColor: color });
                        } catch (e) {
                            console.error(e);
                        } finally {
                            // 延遲一小段時間解鎖，確保通訊完成
                            setTimeout(() => { isClicking = false; }, 50);
                        }
                    } else {
                        // 成員點擊邏輯：直接抓取當下 gameState 裡最即時同步過來的顏色
                        if (color === window.gameState.targetColor) {
                            alert("🎉 太強了！你按對顏色了！");
                        }
                    }
                });

                gridContainer.appendChild(cell);
            });

            // 確保目標顏色顯示盒子的色塊更新
            document.getElementById('target-color-box').style.backgroundColor = window.gameState.targetColor;
        }

        function startListening() {
            // 📡 監聽設定：強制排除本地快取的干擾
            roomRef.onSnapshot({ includeMetadataChanges: false }, (snapshot) => {
                if (snapshot.exists) {
                    const data = snapshot.data();
                    window.gameState.size = data.size;
                    window.gameState.colorMap = data.colorMap;
                    window.gameState.targetColor = data.targetColor;
                    
                    // 拿到新資料才一口氣渲染畫面，解決「點 A 秀 B」的殘影 Bug
                    renderGame(); 
                } else {
                    if (window.gameState.role === 'host') {
                        window.changeGridSize(5);
                    }
                }
            });
        }

        initRoomCheck();
    </script>
</body>
</html>
