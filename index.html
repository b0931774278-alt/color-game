<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>遊戲大合集-終極修復版</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #game-container {
            width: 100%;
            max-width: 900px; 
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            margin: 12px 0;
            text-align: center;
            letter-spacing: 2px;
        }

        .mode-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background-color: #1e1e1e;
            padding: 6px;
            border-radius: 30px;
            border: 1px solid #444;
        }

        .mode-btn {
            background-color: transparent;
            color: #aaa;
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            margin: 0;
        }

        .mode-btn.active {
            background-color: #00bcd4;
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.4);
        }

        .room-info {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 12px;
            background-color: #222;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .control-panel {
            display: none; 
            width: 100%;
            max-width: 750px;
            background-color: #1e1e1e;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-sizing: border-box;
            text-align: center;
            border: 1px solid #a2b;
        }

        button {
            background-color: #333;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 6px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.05s;
        }
        button:active {
            transform: scale(0.95);
        }

        .sub-mode-btn {
            background-color: #252525;
            color: #ffeb3b;
            border: 1px solid #ffeb3b;
        }
        .sub-mode-btn.active {
            background-color: #ffeb3b;
            color: #000;
        }

        .target-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 24px;       
            font-weight: bold;
            background-color: #1e1e1e;
            padding: 16px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: fit-content;
        }

        #target-color-box {
            width: 120px;          
            height: 120px;         
            border-radius: 16px;   
            border: 4px solid #fff;
            background-color: #ccc;
            transition: background-color 0.05s ease;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        #grid-container, #number-grid-container {
            display: grid;
            gap: 16px;            
            width: 100%; 
            max-width: 750px;     
            aspect-ratio: 1 / 1;  
            background-color: #1e1e1e;
            padding: 16px;        
            border-radius: 20px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .cell {
            border-radius: 14px;  
            cursor: pointer;
            transition: transform 0.05s, filter 0.05s;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.3);
        }
        .cell:active {
            transform: scale(0.93); 
            filter: brightness(0.7);
        }

        .cell.cleared {
            background-color: #1a1a1a !important; 
            box-shadow: none !important;
            border: 1px dashed #333;
            cursor: default;
            pointer-events: none; 
        }

        #host-monitor-section {
            width: 100%;
            max-width: 750px;
            background-color: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
            box-sizing: border-box;
            margin-top: 15px;
            border: 1px solid #333;
        }
        .monitor-title {
            font-size: 18px;
            color: #00bcd4;
            margin-bottom: 4px;
            font-weight: bold;
            text-align: center;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }
        .player-card {
            background-color: #262626;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 2px solid #444;
            cursor: pointer;
            user-select: none; 
            -webkit-user-select: none;
            transition: background-color 0.2s;
        }
        .player-card:active {
            background-color: #333;
        }
        .player-card.success {
            border-color: #00e676;
            background-color: #1b3a24;
        }
        .mini-grid {
            display: grid;
            gap: 3px;
            margin: 8px auto 0 auto;
            width: 80px;
            height: 80px;
            background-color: #111;
            padding: 3px;
            border-radius: 6px;
        }
        .mini-cell {
            border-radius: 2px;
            background-color: #444;
        }
        .mini-cell.mini-cleared {
            background-color: #111 !important; 
        }

        /* 🔢 數字遊戲樣式 */
        .num-cell {
            background-color: #2c3e50;
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.1s;
            user-select: none;
        }
        .num-cell:active {
            transform: scale(0.9);
        }
        .num-cell.pressed {
            background-color: #111e29 !important;
            color: #444 !important;
            box-shadow: none;
            cursor: default;
            pointer-events: none; 
        }

        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 18px;
            background-color: #222;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid #444;
        }

        .lobby-panel {
            width: 100%;
            max-width: 450px;
            background-color: #1e1e1e;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .lobby-input {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
            border: 1px solid #444;
            background-color: #121212;
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>🎮 遊戲大對決</h1>

        <div class="mode-switcher">
            <button id="btn-color-mode" class="mode-btn active" onclick="switchGameMode('color')">🎨 色彩對決</button>
            <button id="btn-number-mode" class="mode-btn" onclick="switchGameMode('number')">🔢 數字競速</button>
        </div>

        <!-- ==================== 1. 色彩對決遊戲區 ==================== -->
        <div id="color-game-section" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div id="room-display" class="room-info" style="display: none;"></div>

            <!-- 大廳 -->
            <div id="lobby-section" class="lobby-panel">
                <p style="font-size: 16px; margin-top: 0; color:#aaa;">請輸入你的名字：</p>
                <input type="text" id="name-input" class="lobby-input" placeholder="玩家暱稱" value="玩家"><br>
                <p style="font-size: 16px; margin-top: 10px; color:#aaa;">請輸入房間號碼：</p>
                <input type="number" id="room-input" class="lobby-input" placeholder="房號數字" min="1" value="1"><br>
                
                <button onclick="enterRoom('host')" style="background-color: #a2b; padding: 14px 16px; margin-top: 10px; width: 85%;">👑 我是房主（出題與看即時賽況）</button>
                <br>
                <button onclick="enterRoom('player')" style="background-color: #2b8; padding: 14px 16px; width: 85%;">👥 我是成員（加入格子戰場）</button>
            </div>

            <!-- 戰場 -->
            <div id="battle-section" style="display: none; width: 100%; flex-direction: column; align-items: center;">
                
                <!-- 房主控制台 -->
                <div id="host-panel" class="control-panel">
                    <span style="color: #a2b; font-weight: bold; display: block; margin-bottom: 8px; font-size: 16px;">👑 房主控制台</span>
                    
                    <div style="margin-bottom: 12px; background:#111; padding:8px; border-radius:10px;">
                        <span style="font-size:14px; color:#aaa; display:block; margin-bottom:4px;">選擇遊玩模式：</span>
                        <button id="submode-single-btn" class="sub-mode-btn active" onclick="changeSubMode('single')">🎯 模式一：單格盲找</button>
                        <button id="submode-whack-btn" class="sub-mode-btn" onclick="changeSubMode('whack')">🐹 模式二：地鼠競速</button>
                    </div>

                    <div style="margin-bottom: 12px;">
                        <button onclick="changeGridSize(5)">5 x 5 重製大盤</button>
                        <button onclick="changeGridSize(7)">7 x 7 重製大盤</button>
                        <button onclick="changeGridSize(9)">9 x 9 重製大盤</button>
                    </div>

                    <!-- 🎨 房主自訂題目選色器 -->
                    <div style="background: #252525; padding: 10px; border-radius: 8px; display: inline-block; border: 1px dashed #555;">
                        <label for="host-color-picker" style="font-size: 14px; color: #ffeb3b; font-weight: bold; cursor: pointer;">
                            🎨 房主點此手動指定顏色：
                        </label>
                        <input type="color" id="host-color-picker" value="#ff0000" onchange="hostPickCustomColor(this.value)" style="vertical-align: middle; cursor: pointer; width: 40px; height: 30px; border: none; background: transparent;">
                    </div>
                </div>

                <!-- 目標顏色大框 -->
                <div class="target-section">
                    <span id="target-title-text">目標顏色 (單格盲找)</span>
                    <div id="target-color-box" onclick="hostClickRandomColor()"></div>
                    <div id="player-remain-count" style="display: none; font-size: 16px; color: #ffeb3b; margin-top: 8px;">剩餘目標數量: -- 格</div>
                </div>

                <!-- 【成員專屬】大遊戲格子 -->
                <div id="grid-container"></div>

                <!-- 【房主專屬】成員賽況監控面板 -->
                <div id="host-monitor-section" style="display: none;">
                    <div class="monitor-title">🏁 房間成員即時賽況</div>
                    <div style="text-align: center; color: #888; font-size: 12px; margin-bottom: 10px;">💡 提示：長按某位成員的畫面 1 秒，即可將他踢出房間！</div>
                    <div id="players-monitor-grid" class="players-grid"></div>
                </div>

            </div>
        </div>

        <!-- ==================== 2. 數字競速遊戲區 ==================== -->
        <div id="number-game-section" style="width: 100%; display: none; flex-direction: column; align-items: center;">
            <div class="score-board">
                <div>目標數字: <span id="next-num" style="color: #ffeb3b; font-weight: bold; font-size: 22px;">1</span></div>
                <div>目前時間: <span id="current-timer" style="color: #00e676; font-weight: bold;">0.00</span> 秒</div>
                <div>最快紀錄: <span id="best-timer" style="color: #ff2a6d; font-weight: bold;">--</span> 秒</div>
            </div>
            <div style="margin-bottom: 15px;">
                <button onclick="resetNumberGame()" style="background-color: #e65100; padding: 10px 24px; font-size: 16px;">🔄 重整新局</button>
            </div>
            <div id="number-grid-container"></div>
        </div>

    </div>

    <script>
        // ==================== Firebase 設定 ====================
        const firebaseConfig = {
            apiKey: "AIzaSyANNvPxSkflpr2RMme_fb5vhXRo2YFb4u8",
            authDomain: "color-battle-game-3c9eb.firebaseapp.com",
            projectId: "color-battle-game-3c9eb",
            storageBucket: "color-battle-game-3c9eb.firebasestorage.app",
            messagingSenderId: "669256493534",
            appId: "1:669256493534:web:2705da83d21fc03f36154f",
            measurementId: "G-Q9W172JF6H"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let roomRef = null;
        let hasWonCurrentRound = false; 
        let playerClearedIndices = []; 
        let lastClickedIndexLocal = -1; 
        let localRoundId = ""; // 用來真正鎖定目前回合

        let uploadTimeout = null;
        let pendingUploadData = null;

        const colorPalette = [
            '#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', 
            '#33FFF0', '#FFA500', '#8A2BE2', '#00FF7F', '#FF1493',
            '#00FFFF', '#FFD700', '#FF4500', '#ADFF2F', '#4B0082',
            '#00E676', '#FF2A6D', '#05D5FF', '#A200FF', '#00FF00'
        ];

        window.gameState = {
            role: 'player', 
            roomId: '',
            playerName: '未知玩家',
            size: 5,            
            colorMap: [],       
            targetColor: '#ccc',
            subMode: 'single'
        };

        function triggerVibration(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        window.switchGameMode = function(mode) {
            triggerVibration(40);
            if (mode === 'color') {
                document.getElementById('btn-color-mode').classList.add('active');
                document.getElementById('btn-number-mode').classList.remove('active');
                document.getElementById('color-game-section').style.display = 'flex';
                document.getElementById('number-game-section').style.display = 'none';
            } else {
                document.getElementById('btn-color-mode').classList.remove('active');
                document.getElementById('btn-number-mode').classList.add('active');
                document.getElementById('color-game-section').style.display = 'none';
                document.getElementById('number-game-section').style.display = 'flex';
                if (numGameData.numbers.length === 0) {
                    resetNumberGame();
                }
            }
        };

        // ==================== [模式一] 色彩對決邏輯 ====================
        window.enterRoom = function(chosenRole) {
            const num = document.getElementById('room-input').value;
            let name = document.getElementById('name-input').value.trim();
            if(!num) { alert('請輸入房間號碼！'); return; }
            if(!name) { name = "匿名玩家"; }
            triggerVibration(40);

            if (chosenRole === 'host') {
                window.location.href = window.location.pathname + `?room=${num}&role=host&name=${encodeURIComponent(name)}`;
            } else {
                window.location.href = window.location.pathname + `?room=${num}&name=${encodeURIComponent(name)}`;
            }
        };

        function initRoomCheck() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            const roleParam = urlParams.get('role');
            const nameParam = urlParams.get('name');

            if (roomParam) {
                window.gameState.roomId = roomParam;
                window.gameState.playerName = nameParam ? decodeURIComponent(nameParam) : "玩家";
                roomRef = db.collection("rooms").doc(`room_${roomParam}`);

                document.getElementById('lobby-section').style.display = 'none';
                document.getElementById('battle-section').style.display = 'flex';

                if (roleParam === 'host') {
                    window.gameState.role = 'host';
                    document.getElementById('host-panel').style.display = 'block'; 
                    document.getElementById('grid-container').style.display = 'none'; 
                    document.getElementById('host-monitor-section').style.display = 'block'; 
                    document.getElementById('player-remain-count').style.display = 'none';
                } else {
                    window.gameState.role = 'player';
                    document.getElementById('grid-container').style.display = 'grid'; 
                    document.getElementById('host-monitor-section').style.display = 'none';
                    document.getElementById('player-remain-count').style.display = 'block';
                    
                    window.addEventListener('beforeunload', removeMeFromRoom);
                }
                
                const roomDisplay = document.getElementById('room-display');
                roomDisplay.innerText = `房間號碼：${roomParam} | 名字：${window.gameState.playerName} (${window.gameState.role === 'host' ? '👑 房主' : '👥 成員'})`;
                roomDisplay.style.display = 'block';

                roomRef.set({ roomId: roomParam }, { merge: true }).then(() => {
                    startListening();
                });
            }
        }

        function removeMeFromRoom() {
            if (roomRef && window.gameState.role === 'player') {
                roomRef.collection("players").doc(window.gameState.playerName).delete();
            }
        }

        function generateColors(size) {
            let newColorMap = [];
            for (let i = 0; i < size * size; i++) {
                newColorMap.push(colorPalette[Math.floor(Math.random() * colorPalette.length)]);
            }
            return newColorMap;
        }

        window.changeSubMode = function(mode) {
            if (window.gameState.role !== 'host') return;
            triggerVibration(40);
            window.gameState.subMode = mode;
            
            document.getElementById('submode-single-btn').classList.toggle('active', mode === 'single');
            document.getElementById('submode-whack-btn').classList.toggle('active', mode === 'whack');

            roomRef.update({ subMode: mode });
            window.hostClickRandomColor(); 
        };

        window.changeGridSize = function(size) {
            if (window.gameState.role !== 'host') return;
            triggerVibration([50, 50, 50]);
            const newColorMap = generateColors(size);
            
            roomRef.collection("players").get().then((snapshot) => {
                let batch = db.batch();
                snapshot.docs.forEach((doc) => {
                    batch.update(doc.ref, { isSuccess: false, clearedList: [], remainCount: 999, clickedIndex: -1 });
                });
                return batch.commit();
            }).then(() => {
                roomRef.set({
                    size: size,
                    colorMap: newColorMap,
                    targetColor: '#ccc', 
                    roundId: Date.now().toString() 
                }, { merge: true });
            });
        };

        window.hostClickRandomColor = function() {
            if (window.gameState.role !== 'host') return;
            if (!window.gameState.colorMap || window.gameState.colorMap.length === 0) {
                alert("請先重製大盤盤面！");
                return;
            }
            triggerVibration(40);
            const randomColor = window.gameState.colorMap[Math.floor(Math.random() * window.gameState.colorMap.length)];
            publishNewTargetColor(randomColor);
        };

        window.hostPickCustomColor = function(hexColor) {
            if (window.gameState.role !== 'host') return;
            triggerVibration(50);
            
            if (!window.gameState.colorMap.includes(hexColor.toUpperCase()) && !window.gameState.colorMap.includes(hexColor.toLowerCase())) {
                const updatedMap = [...window.gameState.colorMap];
                updatedMap[updatedMap.length - 1] = hexColor; 
                roomRef.update({ colorMap: updatedMap });
                window.gameState.colorMap = updatedMap;
            }
            
            publishNewTargetColor(hexColor);
        };

        function publishNewTargetColor(color) {
            roomRef.collection("players").get().then((snapshot) => {
                let batch = db.batch();
                snapshot.docs.forEach((doc) => {
                    batch.update(doc.ref, { isSuccess: false, clearedList: [], remainCount: 999, clickedIndex: -1 });
                });
                return batch.commit();
            }).then(() => {
                roomRef.update({ 
                    targetColor: color,
                    roundId: Date.now().toString()
                });
            });
        }

        function countTotalTargetColor(color) {
            let count = 0;
            if (!window.gameState.colorMap || !color) return 0;
            window.gameState.colorMap.forEach(c => { 
                if(c.toLowerCase() === color.toLowerCase()) count++; 
            });
            return count;
        }

        function throttledFirebaseUpload(data) {
            // 🔒 雙重鎖死：上傳任何資料包時，絕對、強制塞入當前自訂玩家暱稱
            const payload = {
                ...data,
                name: window.gameState.playerName,
                lastActive: Date.now()
            };
            
            pendingUploadData = payload;
            if (!uploadTimeout) {
                uploadTimeout = setTimeout(() => {
                    if (roomRef && pendingUploadData) {
                        roomRef.collection("players").doc(window.gameState.playerName).set(pendingUploadData, { merge: true });
                    }
                    uploadTimeout = null;
                    pendingUploadData = null;
                }, 60); // 調快上傳速度以提升即時感
            }
        }

        function renderGridStructure() {
            const size = window.gameState.size;
            if (window.gameState.role === 'host') return; 
            
            const gridContainer = document.getElementById('grid-container');
            if(!gridContainer) return;
            gridContainer.innerHTML = ''; 

            gridContainer.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridContainer.style.gridTemplateRows = `repeat(${size}, 1fr)`;

            if (!window.gameState.colorMap || window.gameState.colorMap.length === 0) return;

            const totalTarget = countTotalTargetColor(window.gameState.targetColor);
            const remainTextBox = document.getElementById('player-remain-count');
            
            if (window.gameState.subMode === 'whack') {
                let remain = totalTarget - playerClearedIndices.length;
                if (window.gameState.targetColor === '#ccc') remain = 0;
                remainTextBox.innerText = `💥 地鼠剩餘數量: ${remain} 格`;
            } else {
                remainTextBox.innerText = `🔍 隱藏模式：找出隨便一格點擊它！`;
            }

            window.gameState.colorMap.forEach((color, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.backgroundColor = color;

                // 地鼠模式：如果本機記錄已點過，直接變黑
                if (window.gameState.subMode === 'whack' && playerClearedIndices.includes(index)) {
                    cell.classList.add('cleared');
                }

                cell.addEventListener('click', () => {
                    if (window.gameState.targetColor === '#ccc') return;
                    
                    const isRightColor = (color.toLowerCase() === window.gameState.targetColor.toLowerCase());

                    if (window.gameState.subMode === 'single') {
                        triggerVibration(30);
                        lastClickedIndexLocal = index;

                        if (isRightColor) {
                            triggerVibration([150, 50, 200]);
                            if (!hasWonCurrentRound) {
                                hasWonCurrentRound = true;
                                alert("🏆 太準了！你抓到了正確顏色！");
                            }
                        } else {
                            triggerVibration(70);
                        }

                        throttledFirebaseUpload({
                            clickedIndex: index,
                            isSuccess: isRightColor
                        });
                    } 
                    else {
                        // 🐹 地鼠競速模式：點擊對的顏色且沒被清除過
                        if (isRightColor && !playerClearedIndices.includes(index)) {
                            playerClearedIndices.push(index);
                            cell.classList.add('cleared'); 
                            triggerVibration(40);
                            
                            const currentRemain = totalTarget - playerClearedIndices.length;
                            remainTextBox.innerText = `💥 地鼠剩餘數量: ${currentRemain} 格`;
                            
                            const amIWin = (currentRemain === 0);

                            throttledFirebaseUpload({
                                clearedList: playerClearedIndices,
                                remainCount: currentRemain,
                                isSuccess: amIWin
                            });

                            if (amIWin && !hasWonCurrentRound) {
                                hasWonCurrentRound = true;
                                triggerVibration([150, 50, 150, 50, 300]);
                                alert("🏆 速度之王！你已消滅畫面上所有目標顏色！");
                            }
                        } else if (!isRightColor) {
                            triggerVibration(80); 
                        }
                    }
                });

                gridContainer.appendChild(cell);
            });
        }

        function startListening() {
            roomRef.onSnapshot((snapshot) => {
                if (snapshot.exists) {
                    const data = snapshot.data();
                    
                    if (data.kickedPlayers && data.kickedPlayers.includes(window.gameState.playerName)) {
                        triggerVibration([300, 100, 300]);
                        window.removeEventListener('beforeunload', removeMeFromRoom);
                        document.body.innerHTML = `<div style="text-align:center; margin-top:100px; font-size:24px; color:#ff2a6d; font-weight:bold;">❌ 你已被房主踢出房間！</div>`;
                        setTimeout(() => {
                            window.location.href = window.location.pathname; 
                        }, 3000);
                        return;
                    }

                    if (data.size === undefined && window.gameState.role === 'host') {
                        window.changeGridSize(5);
                        return;
                    }
                    if (data.size && data.colorMap) {
                        window.gameState.size = data.size;
                        window.gameState.colorMap = data.colorMap;
                        window.gameState.targetColor = data.targetColor || '#ccc';
                        window.gameState.subMode = data.subMode || 'single';

                        const titleTag = document.getElementById('target-title-text');
                        if (window.gameState.subMode === 'whack') {
                            titleTag.innerText = "目標顏色 (地鼠競速消消樂)";
                        } else {
                            titleTag.innerText = "目標顏色 (單格盲找對決)";
                        }
                        
                        // 🔔 只有當房主「出新題目(roundId改變)」時，才洗掉本機狀態與重設
                        if (data.roundId !== localRoundId) {
                            localRoundId = data.roundId;
                            hasWonCurrentRound = false; 
                            playerClearedIndices = []; 
                            lastClickedIndexLocal = -1;
                            
                            if (window.gameState.role === 'player') {
                                const totalTarget = countTotalTargetColor(window.gameState.targetColor);
                                // 🔒 初始化上傳也強制寫入自訂名字
                                roomRef.collection("players").doc(window.gameState.playerName).set({
                                    name: window.gameState.playerName,
                                    clearedList: [],
                                    clickedIndex: -1,
                                    remainCount: window.gameState.targetColor === '#ccc' ? 0 : totalTarget,
                                    isSuccess: false,
                                    lastActive: Date.now()
                                }, { merge: true });
                            }
                        }

                        renderGridStructure(); 
                        document.getElementById('target-color-box').style.backgroundColor = window.gameState.targetColor;
                    }
                }
            });

            roomRef.collection("players").onSnapshot((snapshot) => {
                const playersData = [];
                snapshot.forEach((doc) => {
                    const p = doc.data();
                    // 確保讀出來的資料也有名字，如果沒有就拿它的 document 欄位頂替（加倍保險）
                    if (!p.name) p.name = doc.id; 

                    if (Date.now() - p.lastActive < 15000) { 
                        playersData.push(p);
                    } else {
                        roomRef.collection("players").doc(p.name).delete();
                    }
                });
                if (window.gameState.role === 'host') {
                    renderHostMonitor(playersData);
                }
            });
        }

        function renderHostMonitor(playersList) {
            const monitorGrid = document.getElementById('players-monitor-grid');
            if(!monitorGrid) return;
            monitorGrid.innerHTML = '';

            if(playersList.length === 0) {
                monitorGrid.innerHTML = `<div style="color: #666; font-size: 14px; grid-column: 1/-1;">目前還沒有成員加入此房間...</div>`;
                return;
            }

            if (window.gameState.subMode === 'whack') {
                playersList.sort((a, b) => (a.remainCount || 0) - (b.remainCount || 0));
            } else {
                playersList.sort((a, b) => (b.isSuccess ? 1 : 0) - (a.isSuccess ? 1 : 0));
            }

            playersList.forEach((player) => {
                const finalName = player.name || "未命名成員";

                const card = document.createElement('div');
                card.className = `player-card ${player.isSuccess ? 'success' : ''}`;
                
                let pressTimer = null;
                const startPress = () => {
                    pressTimer = setTimeout(() => {
                        triggerVibration([60, 60]); 
                        const confirmKick = confirm(`🥾 房主威能！確定要將成員 [${finalName}] 踢出房間嗎？`);
                        if (confirmKick) {
                            roomRef.update({
                                kickedPlayers: firebase.firestore.FieldValue.arrayUnion(finalName)
                            });
                            roomRef.collection("players").doc(finalName).delete();
                        }
                    }, 1000); 
                };

                const cancelPress = () => { clearTimeout(pressTimer); };

                card.addEventListener('mousedown', startPress);
                card.addEventListener('touchstart', startPress);
                card.addEventListener('mouseup', cancelPress);
                card.addEventListener('mouseleave', cancelPress);
                card.addEventListener('touchend', cancelPress);
                card.addEventListener('touchcancel', cancelPress);

                const nameTag = document.createElement('div');
                nameTag.style.fontWeight = 'bold';
                nameTag.style.fontSize = '14px';
                nameTag.style.color = player.isSuccess ? '#00e676' : '#fff';
                
                if (window.gameState.subMode === 'whack') {
                    if (player.isSuccess) {
                        nameTag.innerText = `🏆 ${finalName} [全滅]`;
                    } else {
                        const r = (player.remainCount === 999 || player.remainCount === undefined) ? '計算中' : `剩 ${player.remainCount} 格`;
                        nameTag.innerText = `${finalName} [${r}]`;
                    }
                } else {
                    nameTag.innerText = `${finalName} [${player.isSuccess ? '✅ 找到了!' : '❌ 尋找中'}]`;
                }
                card.appendChild(nameTag);

                const miniGrid = document.createElement('div');
                miniGrid.className = 'mini-grid';
                miniGrid.style.gridTemplateColumns = `repeat(${window.gameState.size}, 1fr)`;
                miniGrid.style.gridTemplateRows = `repeat(${window.gameState.size}, 1fr)`;

                const clearedList = player.clearedList || [];

                for (let i = 0; i < window.gameState.size * window.gameState.size; i++) {
                    const miniCell = document.createElement('div');
                    miniCell.className = 'mini-cell';
                    
                    if(window.gameState.colorMap && window.gameState.colorMap[i]) {
                        miniCell.style.backgroundColor = window.gameState.colorMap[i];
                    }

                    if (window.gameState.subMode === 'whack') {
                        if (clearedList.includes(i)) {
                            miniCell.classList.add('mini-cleared');
                        }
                    } else {
                        if (player.clickedIndex === i) {
                            miniCell.style.outline = '2px solid #fff';
                            miniCell.style.boxShadow = '0 0 6px #fff';
                            miniCell.style.transform = 'scale(1.1)';
                            miniCell.style.zIndex = '2';
                        } else if (player.clickedIndex !== undefined && player.clickedIndex !== -1) {
                            miniCell.style.opacity = '0.3';
                        }
                    }

                    miniGrid.appendChild(miniCell);
                }

                card.appendChild(miniGrid);
                monitorGrid.appendChild(card);
            });
        }

        // ==================== [模式二] 1-25 數字競速邏輯 ====================
        let numGameData = {
            currentExpected: 1,
            startTime: null,
            timerInterval: null,
            numbers: [],
            isGaming: false
        };

        function loadBestRecord() {
            const best = localStorage.getItem('speed_num_best');
            document.getElementById('best-timer').innerText = best ? parseFloat(best).toFixed(2) : '--';
        }

        window.resetNumberGame = function() {
            triggerVibration(50);
            clearInterval(numGameData.timerInterval);
            
            numGameData.currentExpected = 1;
            numGameData.startTime = null;
            numGameData.isGaming = false;
            document.getElementById('current-timer').innerText = "0.00";
            document.getElementById('next-num').innerText = "1";
            
            let arr = [];
            for (let i = 1; i <= 25; i++) arr.push(i);
            arr.sort(() => Math.random() - 0.5); 
            numGameData.numbers = arr;

            renderNumberGrid();
            loadBestRecord();
        };

        function renderNumberGrid() {
            const container = document.getElementById('number-grid-container');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(5, 1fr)`;
            container.style.gridTemplateRows = `repeat(5, 1fr)`;

            numGameData.numbers.forEach((num) => {
                const cell = document.createElement('div');
                cell.className = 'num-cell';
                cell.innerText = num;

                const hue = (num * 15) % 360;
                cell.style.backgroundColor = `hsl(${hue}, 45%, 30%)`;

                cell.addEventListener('click', () => {
                    if (!numGameData.isGaming && num === 1) {
                        numGameData.isGaming = true;
                        numGameData.startTime = Date.now();
                        numGameData.timerInterval = setInterval(() => {
                            const diff = (Date.now() - numGameData.startTime) / 1000;
                            document.getElementById('current-timer').innerText = diff.toFixed(2);
                        }, 20);
                    }

                    if (num === numGameData.currentExpected) {
                        triggerVibration(25); 
                        cell.classList.add('pressed'); 
                        
                        if (numGameData.currentExpected === 25) {
                            clearInterval(numGameData.timerInterval);
                            const finalTime = (Date.now() - numGameData.startTime) / 1000;
                            document.getElementById('current-timer').innerText = finalTime.toFixed(2);
                            triggerVibration([100, 50, 100, 50, 300]); 

                            alert(`🏆 恭喜挑戰成功！總共花了 ${finalTime.toFixed(2)} 秒！`);

                            const oldBest = localStorage.getItem('speed_num_best');
                            if (!oldBest || finalTime < parseFloat(oldBest)) {
                                localStorage.setItem('speed_num_best', finalTime);
                                alert("🔥 刷新歷史最快紀錄！");
                                loadBestRecord();
                            }
                        } else {
                            numGameData.currentExpected++;
                            document.getElementById('next-num').innerText = numGameData.currentExpected;
                        }
                    } else {
                        triggerVibration(80);
                    }
                });

                container.appendChild(cell);
            });
        }

        initRoomCheck();
        loadBestRecord();
    </script>
</body>
</html>
